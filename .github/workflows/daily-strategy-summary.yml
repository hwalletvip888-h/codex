name: Daily strategy summary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write daily strategy summary
        run: npm run summarize:daily

      - name: Commit daily summary
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Write daily strategy summary"
          file_pattern: docs/data/operation-log.json docs/data/daily-strategy-summary.json docs/reports/*.md

      - name: Publish daily summary to GitHub Pages
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/signal-paper-pages
          git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/signal-paper-pages
          mkdir -p /tmp/signal-paper-pages/data
          mkdir -p /tmp/signal-paper-pages/reports
          cp docs/index.html /tmp/signal-paper-pages/index.html
          cp docs/data/signal-paper.json /tmp/signal-paper-pages/data/signal-paper.json
          cp docs/data/operation-log.json /tmp/signal-paper-pages/data/operation-log.json
          cp docs/data/daily-strategy-summary.json /tmp/signal-paper-pages/data/daily-strategy-summary.json
          cp docs/reports/*.md /tmp/signal-paper-pages/reports/
          cd /tmp/signal-paper-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/signal-paper.json data/operation-log.json data/daily-strategy-summary.json reports/*.md
          if git diff --cached --quiet; then
            echo "No GitHub Pages changes."
          else
            git commit -m "Publish daily strategy summary"
            git push origin HEAD:gh-pages
          fi
