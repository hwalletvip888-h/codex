name: Signal paper scan

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Onchain OS CLI
        shell: bash
        run: |
          curl -sSL https://raw.githubusercontent.com/okx/onchainos-skills/main/install.sh | bash

      - name: Run signal paper scanner
        id: scan
        continue-on-error: true
        env:
          OKX_PROJECT_ID: ${{ secrets.OKX_PROJECT_ID }}
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          OKX_API_PASSPHRASE: ${{ secrets.OKX_API_PASSPHRASE }}
        run: npm run scan:signal

      - name: Refresh operation log and daily summary
        if: always()
        continue-on-error: true
        run: npm run summarize:daily

      - name: Commit updated paper ledger
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update signal paper ledger"
          file_pattern: docs/data/signal-paper.json docs/data/operation-log.json docs/data/daily-strategy-summary.json docs/reports/*.md

      - name: Publish GitHub Pages data
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/signal-paper-pages
          git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/signal-paper-pages
          mkdir -p /tmp/signal-paper-pages/data
          mkdir -p /tmp/signal-paper-pages/reports
          cp docs/index.html /tmp/signal-paper-pages/index.html
          cp docs/data/signal-paper.json /tmp/signal-paper-pages/data/signal-paper.json
          cp docs/data/operation-log.json /tmp/signal-paper-pages/data/operation-log.json
          cp docs/data/daily-strategy-summary.json /tmp/signal-paper-pages/data/daily-strategy-summary.json
          cp docs/reports/*.md /tmp/signal-paper-pages/reports/
          cd /tmp/signal-paper-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/signal-paper.json data/operation-log.json data/daily-strategy-summary.json reports/*.md
          if git diff --cached --quiet; then
            echo "No GitHub Pages changes."
          else
            git commit -m "Publish signal paper ledger"
            git push origin HEAD:gh-pages
          fi
